<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Probit Analysis Tool - Insecticide LC50/LD50</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        :root{--primary:#3498db;--success:#27ae60;--danger:#e74c3c;--dark:#2c3e50;--light:#f8f9fa}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Segoe UI',Tahoma,sans-serif;background:linear-gradient(135deg,var(--primary),#764ba2);min-height:100vh;padding:20px}
        .container{max-width:1400px;margin:0 auto;background:#fff;border-radius:20px;box-shadow:0 20px 40px rgba(0,0,0,.1);overflow:hidden}
        .header{background:linear-gradient(90deg,var(--dark),var(--primary));color:#fff;padding:30px;text-align:center}
        .header h1{font-size:2.5em;margin-bottom:10px}
        .content{padding:30px}
        .input-section,.results-section{margin-bottom:30px;padding:25px;background:var(--light);border-radius:15px;border-left:5px solid var(--primary)}
        .input-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;margin-bottom:20px}
        input,select{width:100%;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:16px;transition:all .3s}
        input:focus,select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 10px rgba(52,152,219,.3)}
        button{background:linear-gradient(45deg,var(--primary),#2980b9);color:#fff;padding:15px 30px;border:none;border-radius:10px;font-size:16px;cursor:pointer;transition:all .2s;font-weight:600}
        button:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(52,152,219,.3)}
        .charts-container{display:grid;grid-template-columns:repeat(auto-fit,minmax(500px,1fr));gap:20px;margin:20px 0}
        .stat-box{background:#fff;padding:20px;border-radius:10px;box-shadow:0 5px 15px rgba(0,0,0,.1);margin:10px 0;text-align:center}
        .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px}
        .interpretation{background:linear-gradient(135deg,#e8f5e8,#d4edda);border-left-color:var(--success)}
        .warning{background:#fff3cd;border-left-color:#ffc107;color:#856404;padding:15px;border-radius:8px;margin:10px 0}
        table{width:100%;border-collapse:collapse;margin:20px 0;font-size:14px}
        th,td{padding:12px;text-align:center;border:1px solid #ddd}
        th{background:var(--primary);color:#fff;font-weight:600}
        tr:nth-child(even){background:var(--light)}
        tr:hover{background:#e3f2fd}
        @media (max-width:768px){.charts-container,.input-grid{grid-template-columns:1fr}}
        .share-btn{background:var(--success);margin-left:10px}
        .loading{text-align:center;padding:40px;font-size:18px;color:#666}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>🧪 Probit Analysis Tool</h1>
        <p><strong>Insecticide Toxicology</strong> • LC50/LD50 Calculator • Interactive Analysis</p>
    </div>
    <div class="content">
        <div class="input-section">
            <h2>📊 Enter Raw Data (Comma-separated)</h2>
            <div class="input-grid">
                <div><label>Dose/Concentration</label><input type="text" id="doses" placeholder="10,20,40,80,160" value="10,20,40,80,160"></div>
                <div><label>Total Insects (n)</label><input type="text" id="totals" placeholder="50,50,50,50,50"
